name: hasana
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.7+7

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  get_storage: ^2.1.1
  intl: ^0.18.1
  firebase_core:
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/hasana_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F9F0D5"
  adaptive_icon_foreground: "assets/images/hasana_logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/Noto_Naskh_Arabic/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/Noto_Naskh_Arabic/NotoNaskhArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/Noto_Naskh_Arabic/NotoNaskhArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Noto_Naskh_Arabic/NotoNaskhArabic-Bold.ttf
          weight: 700
    - family: Vibes
      fonts:
        - asset: assets/fonts/Vibes-Regular.ttf
